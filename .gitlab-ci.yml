image: node:20

pages:
  stage: deploy
  script:
    - npm ci
    - npm run build

    # Fail fast if runbooks didn't land in dist
    - test -d dist/runbooks
    - ls -la dist/runbooks

    # Publish dist as Pages artifact
    - rm -rf public
    - mkdir -p public
    - cp -R dist/* public/
  artifacts:
    paths:
      - public
  only:
    - master
