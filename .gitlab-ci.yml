image: node:20

pages:
  stage: deploy
  script:
    - npm ci
    - npm run build
    - npm i -g staticrypt
    - test -n "$RUNBOOK_PWD"

    - |
        find dist/runbooks -type f -path '*/full/index.html' | while read -r file; do
          echo "Encrypting: $file"
          outdir="$(dirname "$file")"
          staticrypt "$file" -p "$RUNBOOK_PWD" --config false --template staticrypt-template.html -d "$outdir"
          grep -q "staticrypt" "$file"
        done

    - rm -rf public
    - mkdir -p public
    - cp -R dist/* public/

  artifacts:
    paths:
      - public

  only:
    - master