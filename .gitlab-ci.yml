image: node:20

pages:
  stage: deploy
  script:
    - npm ci
    - npm run build
    - npm i -g staticrypt
    - test -n "$RUNBOOK_PWD"

    - |
        find dist/runbooks -type f -path '*/full/index.html' | while read -r file; do
          echo "Encrypting: $file"
          outdir="$(dirname "$file")"

          staticrypt "$file" \
            -p "$RUNBOOK_PWD" \
            --config false \
            --template-title "QA Test Lab • Runbook Access" \
            --template-instructions "This runbook contains implementation-level detail. Access is restricted to approved viewers." \
            --template-button "Access runbook" \
            --template-placeholder "Enter password" \
            --template-error "Incorrect password." \
            -d "$outdir"

          # darken staticrypt page safely
          sed -i 's/background: #ffffff;/background: #111827;/g' "$file"
          sed -i 's/color: #000;/color: #e6edf3;/g' "$file"
          sed -i 's/background: #f2f2f2;/background: #0b0f17;/g' "$file"
          sed -i 's/border: 0;/border: 1px solid #2a2f3a;/g' "$file"
          sed -i 's/color: #666;/color: #e6edf3;/g' "$file"
          sed -i 's/background: #4CAF50;/background: #2563eb;/g' "$file"




          

          grep -q "staticrypt" "$file"
        done

    - rm -rf public
    - mkdir -p public
    - cp -R dist/* public/

  artifacts:
    paths:
      - public

  only:
    - master