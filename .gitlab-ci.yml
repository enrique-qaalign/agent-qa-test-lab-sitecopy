image: node:20

pages:
  stage: deploy
  script:
    - npm ci
    - npm run build
    - npm i -g staticrypt

    # Fail fast if runbooks didn't land in dist
    - test -d dist/runbooks
    - ls -la dist/runbooks

    # Encrypt full runbooks
    - |
      for rb in 05 06 07 08 09 09.5 14 15 16 17; do
        staticrypt "dist/runbooks/$rb/full/index.html" \
          -o "dist/runbooks/$rb/full/index.html" \
          -p "$RUNBOOK_PWD"
      done

    # Publish dist as Pages artifact
    - rm -rf public
    - mkdir -p public
    - cp -R dist/* public/
  artifacts:
    paths:
      - public
  only:
    - master