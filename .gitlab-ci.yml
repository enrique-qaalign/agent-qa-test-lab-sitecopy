image: node:20

pages:
  stage: deploy
  script:
    - npm ci
    - npm run build
    - npm i -g staticrypt
    - test -n "$RUNBOOK_PWD"

    - |
        set -e
        find dist/runbooks -type f -path '*/full/index.html' | while read -r file; do
          echo "Encrypting: $file"
          tmpfile="${file}.tmp"

          staticrypt "$file" "$RUNBOOK_PWD" \
            --output "$tmpfile"

          test -f "$tmpfile"
          mv "$tmpfile" "$file"
          grep -q "staticrypt" "$file"
        done

    - rm -rf public
    - mkdir -p public
    - cp -R dist/* public/

  artifacts:
    paths:
      - public

  only:
    - master